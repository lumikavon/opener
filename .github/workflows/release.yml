name: release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            args: ''
          - runner: windows-latest
            args: ''
          - runner: macos-latest
            args: '--target aarch64-apple-darwin'
          - runner: macos-latest
            args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: startsWith(matrix.runner, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.runner, 'macos-') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate tag matches app version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          app_version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"

          if [ "$tag_version" != "$app_version" ]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match app version ${app_version}." >&2
            exit 1
          fi

      - name: Run Rust tests
        run: npm test

      - name: Build and publish release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Opener v__VERSION__'
          releaseBody: 'See the assets to download this version for Windows, macOS, and Linux.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
